<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        r6: {
                            dark: '#0F172A',
                            neutral: '#1E293B',
                            accent: '#06B6D4',
                            red: '#EF4444',
                            blue: '#3B82F6',
                            light: '#F1F5F9'

                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }

            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-hover { transition: all 0.3s; }
            .card-hover:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
            .btn-primary { @apply bg-r6-accent text-white px-6 py-3 rounded-lg font-bold transition-all hover:bg-opacity-90 active:scale-95; }
            .btn-option { @apply bg-r6-neutral text-r6-light w-full p-4 rounded-lg mb-3 text-left transition-all hover:bg-r6-accent hover:text-white cursor-pointer; }
        }
    </style>
</head>
<body class="bg-r6-dark text-r6-light min-h-screen">

                <p class="text-r6-accent text-xl mb-6">测试你的性格最像哪位干员</p>

            </div>
            <button id="startBtn" class="btn-primary">
                开始测试 <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>

        <!-- 测试页 -->
        <div id="quiz" class="hidden py-8">
            <div class="mb-6 flex justify-between items-center">
                <h2 class="text-2xl font-bold">性格测试</h2>
                <span id="progress" class="text-r6-accent font-semibold">1/36</span>
            </div>
            <div class="bg-r6-neutral rounded-xl p-6 mb-6">
                <h3 id="question" class="text-xl mb-4 font-medium">题目加载中...</h3>
                <div id="options" class="space-y-2"></div>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="result" class="hidden py-8 text-center">
            <div class="bg-r6-neutral rounded-xl p-8 shadow-xl">
                <div class="w-32 h-32 mx-auto mb-4 rounded-full bg-r6-dark flex items-center justify-center">
                    <i id="resultIcon" class="fa-solid fa-user-astronaut text-5xl text-r6-accent"></i>
                </div>
                <h2 class="text-3xl font-bold mb-2">你的专属干员</h2>
                <h3 id="resultName" class="text-r6-accent text-2xl mb-2">干员名称</h3>
                <span id="resultTeam" class="inline-block px-3 py-1 rounded-full text-sm font-semibold mb-4"></span>
                <p id="resultPersonality" class="text-gray-300 mb-4 text-lg">性格标签</p>
                <p id="resultDesc" class="text-gray-400 mb-6">干员描述</p>
                <button id="restartBtn" class="btn-primary">
                    重新测试 <i class="fa-solid fa-rotate-right ml-2"></i>
                </button>
            </div>
        </div>
    </div>

            { question: "你更喜欢的位置是？", options: [{ text: "前线突破手", operator: "thermite" },{ text: "信息位", operator: "iq" },{ text: "支援位", operator: "doc" },{ text: "防守核心", operator: "jager" }]},
            { question: "压力大时你会？", options: [{ text: "主动释放，直面压力", operator: "thermite" },{ text: "冷静处理，专注目标", operator: "ash" },{ text: "自我调节，安抚他人", operator: "doc" },{ text: "独自消化，不动声色", operator: "caveira" }]},
            { question: "你对规则的态度？", options: [{ text: "打破规则，创造可能", operator: "thermite" },{ text: "遵守规则，高效执行", operator: "ash" },{ text: "灵活变通，以人为本", operator: "doc" },{ text: "坚守规则，稳定大局", operator: "rook" }]},
            { question: "你更擅长？", options: [{ text: "进攻突破", operator: "thermite" },{ text: "情报收集", operator: "iq" },{ text: "团队防御", operator: "jager" },{ text: "医疗支援", operator: "doc" }]},
            { question: "你的性格底色是？", options: [{ text: "热情勇敢", operator: "thermite" },{ text: "冷静理智", operator: "iq" },{ text: "温柔善良", operator: "doc" },{ text: "神秘独立", operator: "caveira" }]},
            { question: "团队合作中你是？", options: [{ text: "领导者", operator: "thermite" },{ text: "执行者", operator: "ash" },{ text: "守护者", operator: "rook" },{ text: "自由人", operator: "caveira" }]},
            { question: "你喜欢的作战方式？", options: [{ text: "正面强攻", operator: "thermite" },{ text: "快速突袭", operator: "ash" },{ text: "阵地防御", operator: "bandit" },{ text: "隐秘侦查", operator: "caveira" }]},
            { question: "你对待陌生人的态度？", options: [{ text: "热情友好", operator: "thermite" },{ text: "礼貌疏离", operator: "ash" },{ text: "温和包容", operator: "doc" },{ text: "保持警惕", operator: "caveira" }]},
            { question: "你做决定的速度？", options: [{ text: "非常快，果断", operator: "ash" },{ text: "较快，思考后", operator: "thermite" },{ text: "较慢，谨慎", operator: "rook" },{ text: "看情况，灵活", operator: "jager" }]},
            { question: "你更在意？", options: [{ text: "胜利结果", operator: "bandit" },{ text: "团队感受", operator: "doc" },{ text: "个人发挥", operator: "caveira" },{ text: "过程体验", operator: "iq" }]},
            { question: "你应对变化的能力？", options: [{ text: "随机应变，适应力强", operator: "jager" },{ text: "提前规划，应对变化", operator: "rook" },{ text: "快速调整，直面变化", operator: "ash" },{ text: "不喜欢变化，偏爱稳定", operator: "doc" }]},
            { question: "你是一个？", options: [{ text: "理想主义者", operator: "iq" },{ text: "现实主义者", operator: "bandit" },{ text: "利他主义者", operator: "doc" },{ text: "实用主义者", operator: "ash" }]},
            { question: "你喜欢的干员类型？", options: [{ text: "强攻型", operator: "thermite" },{ text: "技术型", operator: "bandit" },{ text: "支援型", operator: "rook" },{ text: "侦查型", operator: "caveira" }]},

            { question: "你的缺点是？", options: [{ text: "过于冲动", operator: "thermite" },{ text: "过于理性", operator: "iq" },{ text: "过于心软", operator: "doc" },{ text: "过于孤僻", operator: "caveira" }]},
            { question: "你更喜欢？", options: [{ text: "进攻方", operator: "ash" },{ text: "防守方", operator: "jager" },{ text: "都喜欢", operator: "doc" },{ text: "看心情", operator: "caveira" }]},
            { question: "你处理情绪的方式？", options: [{ text: "直接表达", operator: "thermite" },{ text: "理性压抑", operator: "ash" },{ text: "默默消化", operator: "caveira" },{ text: "安抚他人", operator: "doc" }]},
            { question: "你对团队的价值？", options: [{ text: "突破核心", operator: "thermite" },{ text: "智力担当", operator: "iq" },{ text: "暖心后盾", operator: "doc" },{ text: "稳定防线", operator: "rook" }]},
            { question: "你向往的生活？", options: [{ text: "充满挑战", operator: "ash" },{ text: "安稳平静", operator: "rook" },{ text: "自由随性", operator: "caveira" },{ text: "充实有意义", operator: "doc" }]},
            { question: "你学习新事物的方式？", options: [{ text: "直接实践", operator: "thermite" },{ text: "理论学习", operator: "iq" },{ text: "模仿他人", operator: "rook" },{ text: "自主探索", operator: "caveira" }]},
            { question: "你面对失败的态度？", options: [{ text: "重整旗鼓，下次再战", operator: "thermite" },{ text: "分析原因，避免再犯", operator: "iq" },{ text: "自我安慰，调整心态", operator: "doc" },{ text: "无所谓，继续前行", operator: "caveira" }]},
            { question: "你更适合？", options: [{ text: "指挥他人", operator: "thermite" },{ text: "配合他人", operator: "rook" },{ text: "独立完成", operator: "caveira" },{ text: "辅助支持", operator: "doc" }]},
            { question: "你的思维方式？", options: [{ text: "线性思维，直接高效", operator: "ash" },{ text: "发散思维，创意十足", operator: "iq" },{ text: "感性思维，以人为本", operator: "doc" },{ text: "批判性思维，冷静客观", operator: "bandit" }]},
            { question: "你喜欢的氛围？", options: [{ text: "热闹积极", operator: "thermite" },{ text: "安静平和", operator: "rook" },{ text: "高效专注", operator: "ash" },{ text: "自由轻松", operator: "caveira" }]},
            { question: "你对信任的看法？", options: [{ text: "轻易信任他人", operator: "doc" },{ text: "慢慢观察再信任", operator: "rook" },{ text: "只信任自己", operator: "caveira" },{ text: "信任靠谱的人", operator: "thermite" }]},
            { question: "你解决矛盾的方式？", options: [{ text: "直接沟通，解决问题", operator: "ash" },{ text: "冷静调解，缓和气氛", operator: "doc" },{ text: "置身事外，不参与", operator: "caveira" },{ text: "理性分析，分清对错", operator: "iq" }]},
            { question: "你是一个什么样的玩家？", options: [{ text: "冲锋陷阵", operator: "thermite" },{ text: "策略运营", operator: "bandit" },{ text: "团队支援", operator: "doc" },{ text: "游走侦查", operator: "caveira" }]},
            { question: "你最想拥有的能力？", options: [{ text: "突破一切障碍", operator: "thermite" },{ text: "掌控信息情报", operator: "iq" },{ text: "治愈保护他人", operator: "doc" },{ text: "隐秘无声行动", operator: "caveira" }]},
            { question: "最终测试：你心中的R6精神是？", options: [{ text: "勇气与突破", operator: "thermite" },{ text: "智慧与策略", operator: "iq" },{ text: "守护与团结", operator: "rook" },{ text: "独立与坚韧", operator: "caveira" }]}
        ];

        // 干员数据
        const operatorData = {
            thermite: { name: "Thermite（热切）", team: "进攻方", teamColor: "bg-r6-red", personality: "热情、果断、天生领袖", desc: "你是团队的先锋，充满勇气与领导力，遇到困难从不退缩，总能带领大家突破困境，是值得信赖的核心人物。", icon: "fa-fire-flame-curved" },
            ash: { name: "Ash（艾什）", team: "进攻方", teamColor: "bg-r6-red", personality: "高效、直率、行动派", desc: "你追求效率，做事雷厉风行，不喜欢拖沓，头脑灵活执行力拉满，是团队中最可靠的突击手。", icon: "fa-bolt" },
            jager: { name: "Jäger（耶格）", team: "防守方", teamColor: "bg-r6-blue", personality: "冷静、机智、守护欲强", desc: "你性格沉稳冷静，拥有极强的观察力，擅长保护队友，是团队中最坚实的后盾。", icon: "fa-shield" },
            bandit: { name: "Bandit（班迪）", team: "防守方", teamColor: "bg-r6-blue", personality: "技术宅、沉稳、可靠", desc: "你聪明机智，擅长用技术解决问题，性格低调内敛，关键时刻总能发挥关键作用。", icon: "fa-bolt-lightning" },
            doc: { name: "Doc（医生）", team: "防守方", teamColor: "bg-r6-blue", personality: "温柔、利他、团队守护者", desc: "你心地善良，乐于助人，把他人的安全放在第一位，是团队中最温暖的存在。", icon: "fa-heart-pulse" },
            rook: { name: "Rook（洛克）", team: "防守方", teamColor: "bg-r6-blue", personality: "稳重、踏实、安全感满满", desc: "你性格踏实稳重，做事靠谱，总能给身边的人带来满满的安全感，是团队的定心丸。", icon: "fa-shield-halved" },
            iq: { name: "IQ（精英干员）", team: "进攻方", teamColor: "bg-r6-red", personality: "聪慧、理性、追求完美", desc: "你智商超群，理性冷静，做事精益求精，擅长用智慧破解难题，是团队中的智囊。", icon: "fa-brain" },
            caveira: { name: "Caveira（女鬼）", team: "防守方", teamColor: "bg-r6-blue", personality: "神秘、敏锐、独立", desc: "你特立独行，观察力敏锐，拥有强大的独立能力，不依赖他人，自带神秘气场。", icon: "fa-mask" }
        };

        // 全局变量
        let currentQuestion = 0;
        let score = {};
        Object.keys(operatorData).forEach(key => score[key] = 0);

        // DOM元素
        const homePage = document.getElementById('home');
        const quizPage = document.getElementById('quiz');
        const resultPage = document.getElementById('result');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const progressEl = document.getElementById('progress');
        const resultName = document.getElementById('resultName');
        const resultTeam = document.getElementById('resultTeam');
        const resultPersonality = document.getElementById('resultPersonality');
        const resultDesc = document.getElementById('resultDesc');
        const resultIcon = document.getElementById('resultIcon');

        // 开始测试
        startBtn.addEventListener('click', () => {
            homePage.classList.add('hidden');
            quizPage.classList.remove('hidden');
            loadQuestion();
        });

        // 加载题目
        function loadQuestion() {
            const current = quizData[currentQuestion];
            questionEl.textContent = current.question;
            optionsEl.innerHTML = '';
            progressEl.textContent = `${currentQuestion + 1}/${quizData.length}`;

            current.options.forEach(option => {
                const div = document.createElement('div');
                div.className = 'btn-option';
                div.textContent = option.text;
                div.addEventListener('click', () => selectOption(option.operator));
                optionsEl.appendChild(div);
            });
        }

        // 选择选项
        function selectOption(operator) {
            score[operator]++;
            currentQuestion++;

            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        // 展示结果
        function showResult() {
            quizPage.classList.add('hidden');
            resultPage.classList.remove('hidden');

            let maxScore = -1;
            let bestOperator = '';
            for (const [op, s] of Object.entries(score)) {
                if (s > maxScore) {
                    maxScore = s;
                    bestOperator = op;
                }
            }

            const data = operatorData[bestOperator];
            resultName.textContent = data.name;
            resultTeam.textContent = data.team;
            resultTeam.className = `inline-block px-3 py-1 rounded-full text-sm font-semibold mb-4 ${data.teamColor}`;
            resultPersonality.textContent = data.personality;
            resultDesc.textContent = data.desc;
            resultIcon.className = `fa-solid ${data.icon} text-5xl text-r6-accent`;
        }

        // 重新测试
        restartBtn.addEventListener('click', () => {
            currentQuestion = 0;
            Object.keys(score).forEach(key => score[key] = 0);
            resultPage.classList.add('hidden');
            homePage.classList.remove('hidden');
        });
    </script>
</body>
</html>
